<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gulf Coast IV Concierge</title>
    <script type="text/javascript">
      // GitHub Pages SPA Hack
      // This script checks if a redirect is needed and redirects to the main index.html
      var pathSegmentsToKeep = 1; // This must match your repo name depth ('/gulf-coast/')

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
